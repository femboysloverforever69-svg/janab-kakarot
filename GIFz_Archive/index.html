body {
margin: 0;

overflow-y: scroll;
min-height: calc(100vh + 50px);

/* ==== BACKGROUNDS FIXES ==== */
.bg-fence {
  position: fixed;
  inset: 0;
  background-image: url("images/fence_tile.png");
  background-repeat: repeat;
  background-size: 256px 256px;
  pointer-events: none;
  z-index: -10;
  will-change: transform;
}
.bg-panel {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 1000px;    
  height: 100%;
  background: rgba(40, 60, 40, 0.96); /* transparency */
  z-index: -5;
  pointer-events: none;
}

.bg-panel::before,
.bg-panel::after {
  content: "";
  position: absolute;
  top: 0;
  width: 10px;            /* largeur du biseau */
  height: 100%;
  z-index: 1;
}
.bg-panel::before {
  left: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,1),        /* bord 100% opaque */
    rgba(0,0,0,0.1)       /* se fond vers le fond semi-transparent */
  );
}
.bg-panel::after {
  right: 0;
  background: linear-gradient(
    to left,
    rgba(0,0,0,1),        /* bord 100% opaque */
    rgba(0,0,0,0.1)
  );
}

/* ==== FRAMES ET SCENE ==== */
.Fr4me {
  width: 1050px;
  margin: 0 auto;
}
@media (max-width: 1100px) {
  .Fr4me { width: 100%; }
}

.scene {
  width: 820px;
  margin: 100px auto;
  scroll-behavior: smooth;
  overflow: visible;
}
@media (max-width: 900px) {
  .scene { width: 100%; margin: 60px auto; }
}

/* ==== GARAGES ==== */
.garage-spacer {
  height: 1px;
  pointer-events: none;
}

.garage {
  position: relative;
  overflow: hidden; /* important */
  height: 0;        /* klosed @ 1st */
  transition: height 1.2s linear;
  z-index: 1;
}

.garage-content {
  padding: 0;
}

.garage .binder-page {
  margin: 0 auto;
}

/* Garage door */
.garage-door {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 100%;
  background-image: url("garage-door.html");
  background-size: cover;
  transform: translateY(0);
  transition: transform 0.8s ease;
  z-index: 2;
}

.scene.open .garage-door {
  transform: translateY(100%);
}

/* ==== DECORS TOP / BOTTOM ====*/
.decor img {
  display: block;
  width: 100%;
}

.decor-top, .decor-bottom {
  position: relative;
  z-index: 10;
}
.decor-top { cursor: pointer; }

/* responsive décor */
@media (min-width: 901px) {
  .decor-top img,
  .decor-bottom img {
    width: 900px;
    margin-left: 50%;
    transform: translateX(-50%);
  }
}
@media (max-width: 900px) {
  .decor-top img,
  .decor-bottom img {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    transform: none;
  }
}

/* Ombres décor */
.img-bottom {
  display: block;
  margin-left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 10px 15px -5px rgba(0,0,0,0.7);
}

/* Ombre uniquement sous img-top */
.decor-top::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 100%;
  height: 30px;       /* épaisseur de l'ombre */
  background: rgba(0,0,0,0.55);
  filter: blur(12px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 5;
}
.scene.open .decor-top::after,
.scene.closing .decor-top::after {
  opacity: 1;
}

/* Supprime les drop-shadows existantes sur les images */
.scene.open .decor-top img,
.scene.closing .decor-top img,
.scene.open .decor-bottom img,
.scene.closing .decor-bottom img {
  filter: none;
}

/* ==== PANNEAU ET LOGO ==== */
.panneau-wrapper {
  position: relative;
  width: 100%;
  height: 450px;
  overflow: visible;
}

.panneau {
  position: absolute;

  left: 50%;
  width: 500px;

.panneau::after {
  content: "";

/* ==== HOME IMAGE ==== */

/* ==== SLIDERZ ET CADRES ==== */
.fader {

.fader li img { max-width: 100%; }

.fader li:last-child:nth-child(odd) {

  justify-self: center;

.cadre {

  <!-- ===== SCRIPTS BEDR00MZ ===== -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ==== PANNEAU SCROLL PARALLAX ==== */
  const panneau = document.querySelector('.panneau');
  if (panneau) {
    const speedFactor = 1.5; // vitesse de décalage du panneau
    window.addEventListener('scroll', () => {
      panneau.style.setProperty('--offset', `${-window.scrollY * speedFactor}px`);
    });
  }

  /* ==== SLIDERS ALEATOIRES ==== */
  document.querySelectorAll('.randomSlider .fader').forEach(container => {
    const items = [...container.querySelectorAll('li')];
    const len = items.length;
    for (let i = 0; i < len; i++) {
      container.prepend(items[Math.floor(Math.random() * len)]);
    }
  });

  /* ==== SONS DE HOVER ==== */
  let soundEnabled = true;

  function playHoverSFX(volume = 1) {
    if (!soundEnabled) return;
    const base = document.getElementById("garage-hover");
    if (!base) return;

    const s = base.cloneNode();
    s.volume = volume;
    s.play().catch(()=>{});
  }

  document.querySelectorAll(".decor-top img, .decor-bottom").forEach(el => {
    el.addEventListener("mouseenter", () => playHoverSFX(0.12));
  });

  /* ==== SCENES GARAGES ==== */
  const GARAGE_DURATION = 1200;
  let audioTimeout = null;

  const openSound  = document.getElementById("garage-0pen");
  const closeSound = document.getElementById("garage-klose");
  const clangSound = document.getElementById("garage-klang");

  if (openSound)  openSound.volume  = 0.6;
  if (closeSound) closeSound.volume = 0.6;
  if (clangSound) clangSound.volume = 0.8;

  document.querySelectorAll(".scene").forEach(scene => {

    const topImg  = scene.querySelector(".decor-top img");
    const bottom  = scene.querySelector(".decor-bottom");
    const garage  = scene.querySelector(".garage");
    const content = scene.querySelector(".garage-content");

    function setTop(state) {
      if (!topImg) return;
      if (state === "off")   topImg.src = topImg.dataset.off;
      if (state === "hover") topImg.src = topImg.dataset.hover;
      if (state === "on")    topImg.src = topImg.dataset.on;
    }

    [topImg, bottom].forEach(el => {
      if (!el) return;

      el.addEventListener("mouseenter", () => {
        if (!scene.classList.contains("open")) setTop("hover");
      });

      el.addEventListener("mouseleave", () => {
        if (!scene.classList.contains("open")) setTop("off");
      });

      /* CLICK = GESTE AUDIO VALIDE (IMPORTANT MOBILE) */
      el.addEventListener("click", () => {

        if (scene.classList.contains("open")) {
          /* ==== CLOSING ==== */
          if (garage) garage.style.height = "0px";
          scene.classList.remove("open");
          scene.classList.add("closing");
          setTop("off");

          clearTimeout(audioTimeout);

          if (openSound)  { openSound.pause(); openSound.currentTime = 0; }
          if (closeSound) { closeSound.currentTime = 0; closeSound.play().catch(()=>{}); }

          audioTimeout = setTimeout(() => {
            if (closeSound) { closeSound.pause(); closeSound.currentTime = 0; }
            if (clangSound) { clangSound.currentTime = 0; clangSound.play().catch(()=>{}); }
          }, GARAGE_DURATION);

          setTimeout(() => {
            scene.classList.remove("closing");
          }, GARAGE_DURATION);

        } else {
          /* ==== OPENING ==== */
          if (garage && content) {
            garage.style.height = content.scrollHeight + "px";
          }

          scene.classList.add("open");
          setTop("on");

          clearTimeout(audioTimeout);

          if (closeSound) { closeSound.pause(); closeSound.currentTime = 0; }
          if (openSound)  { openSound.currentTime = 0; openSound.play().catch(()=>{}); }

          audioTimeout = setTimeout(() => {
            if (openSound) { openSound.pause(); openSound.currentTime = 0; }
          }, GARAGE_DURATION);
        }

      });
    });

  });

  /* ==== AUDIO UNLOCK GLOBAL (OBLIGATOIRE MOBILE) ==== */
  const audioIds = [
    "garage-0pen",
    "garage-klose",
    "garage-klang",
    "garage-hover"
  ];

  let audioUnlocked = false;

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;

    audioIds.forEach(id => {
      const a = document.getElementById(id);
      if (!a) return;

      const v = a.volume;
      a.volume = 0;
      a.play().then(() => {
        a.pause();
        a.currentTime = 0;
        a.volume = v;
      }).catch(()=>{});
    });

    window.removeEventListener("click", unlockAudio);
    window.removeEventListener("touchstart", unlockAudio);
  }

  window.addEventListener("click", unlockAudio);
  window.addEventListener("touchstart", unlockAudio);

});

/* ==== PARALLAX GRILLAGE ==== */
window.addEventListener("DOMContentLoaded", () => {
  const fence = document.querySelector(".bg-fence");
  const initialX = -50;
  if (fence) fence.style.backgroundPosition = `${initialX}px 0px`;
});

window.addEventListener("scroll", () => {
  const fence = document.querySelector(".bg-fence");
  if (!fence) return;
  const y = window.scrollY;
  const initialX = -50;
  fence.style.backgroundPosition = `${initialX}px ${y * 0.2}px`;
});
</script>
