<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrollo Art Vault</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #050005;
            color: #8b5cf6;
            font-family: monospace;
            overflow: hidden;
        }

        /* Disable Right Click & Selection */
        body {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Scanline Background */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
        }

        /* Main Container */
        #vault-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
        }

        /* The Header */
        .vault-header {
            font-size: 20px;
            font-weight: bold;
            color: #a855f7;
            text-shadow: 0 0 15px #a855f7;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 2px dashed #8b5cf6;
            padding-bottom: 10px;
            width: 80%;
            max-width: 600px;
        }

        /* --- VAULT GRID VIEW (FIXED ALIGNMENT) --- */
        #vault-grid-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Explicit Grid layout to force 1-2-3 / 7 / 4-5-6 */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto auto;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        /* Forcing exact positions so it never breaks */
        .node-1 {
            grid-column: 1;
            grid-row: 1;
        }

        .node-2 {
            grid-column: 2;
            grid-row: 1;
        }

        .node-3 {
            grid-column: 3;
            grid-row: 1;
        }

        .node-7 {
            grid-column: 2;
            grid-row: 2;
        }

        /* Dead Center */
        .node-4 {
            grid-column: 1;
            grid-row: 3;
        }

        .node-5 {
            grid-column: 2;
            grid-row: 3;
        }

        .node-6 {
            grid-column: 3;
            grid-row: 3;
        }

        .vault-box {
            background: #000;
            border: 2px solid #8a0303;
            color: #8a0303;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(138, 3, 3, 0.3);
            position: relative;
            overflow: hidden;
        }

        .vault-box:hover {
            background: #110000;
            box-shadow: inset 0 0 20px rgba(138, 3, 3, 0.8), 0 0 10px #8a0303;
        }

        .vault-box.unlocked {
            border-color: #8b5cf6;
            color: #a855f7;
            box-shadow: inset 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .box-title {
            font-size: 10px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .box-number {
            font-size: 22px;
            font-weight: bold;
        }

        .blink {
            animation: flash 1.5s infinite;
        }

        .fast-blink {
            animation: flash 0.5s infinite;
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        /* The Footer */
        .vault-footer {
            font-size: 12px;
            color: #8a0303;
            text-shadow: 0 0 5px #8a0303;
            text-align: center;
            letter-spacing: 1px;
            margin-top: auto;
        }

        /* --- IMAGE VIEWER VIEW --- */
        #viewer-view {
            display: none;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        /* SLEEK VERTICAL GO BACK BUTTONS */
        .back-btn {
            background: #000;
            border: 2px solid #8a0303;
            color: #ff0000;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 20px 10px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(138, 3, 3, 0.5);
            writing-mode: vertical-rl;
            /* True vertical text */
            text-orientation: upright;
            /* Keeps letters facing normally */
            letter-spacing: 4px;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #8a0303;
            color: #fff;
            box-shadow: 0 0 20px #8a0303;
        }

        /* Decrypting Text Area */
        #decrypt-text {
            color: #a855f7;
            font-size: 18px;
            text-shadow: 0 0 10px #a855f7;
            text-align: center;
            line-height: 2;
            width: 60%;
        }

        /* The Secure Image Frame */
        #secure-image-frame {
            display: none;
            width: 70%;
            height: 95%;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Absolute Protection: Untouchable Image */
        .untouchable-art {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            -webkit-user-drag: none;
            /* Stops dragging */
            -webkit-touch-callout: none;
            /* Stops mobile long-press menus */
            pointer-events: none;
            /* Stops all clicks on the image itself */
            filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4));
        }

        /* Mobile Tweaks */
        @media (max-width: 768px) {
            .grid-layout {
                gap: 10px;
            }

            .vault-box {
                padding: 10px 2px;
            }

            .back-btn {
                padding: 15px 5px;
                font-size: 12px;
            }

            #secure-image-frame {
                width: 75%;
            }

            .vault-header {
                font-size: 16px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="vault-container">

        <div id="vault-grid-view">
            <div class="vault-header">>> SOME OF MY FAV ARTS OF CHROLLO</div>

            <div class="grid-layout">
                <div class="vault-box node-1" onclick="openVault(1, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink">01</div>
                </div>
                <div class="vault-box node-2" onclick="openVault(2, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink" style="animation-delay: 0.2s;">02</div>
                </div>
                <div class="vault-box node-3" onclick="openVault(3, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink" style="animation-delay: 0.4s;">03</div>
                </div>

                <div class="vault-box node-7" onclick="openVault(7, this)">
                    <div class="box-title" style="color:#ff0000;">MASTER NODE</div>
                    <div class="box-number blink" style="animation-delay: 1.2s; color:#ff0000;">07</div>
                </div>

                <div class="vault-box node-4" onclick="openVault(4, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink" style="animation-delay: 0.6s;">04</div>
                </div>
                <div class="vault-box node-5" onclick="openVault(5, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink" style="animation-delay: 0.8s;">05</div>
                </div>
                <div class="vault-box node-6" onclick="openVault(6, this)">
                    <div class="box-title">NODE</div>
                    <div class="box-number blink" style="animation-delay: 1.0s;">06</div>
                </div>
            </div>

            <div class="vault-footer">/// ALL ART BELONGS TO THEIR ORIGINAL CREATORS ///</div>
        </div>

        <div id="viewer-view">
            <button class="back-btn" onclick="closeVault()">[GO BACK]</button>

            <div id="decrypt-text">
                DECRYPTING CLASSIFIED NODE...<br>
                <span class="fast-blink">||||||||||||||||||</span>
            </div>

            <div id="secure-image-frame">
                <img id="displayed-art" class="untouchable-art" src="" alt="">
            </div>

            <button class="back-btn" onclick="closeVault()">[GO BACK]</button>
        </div>

    </div>

    <script>
        // FIXED: Nodes 1 and 4 are now pointing to .png files!
        const fileDatabase = {
            1: 'kr1.png',  // Changed to .png
            2: 'kr2.jpg',
            3: 'kr3.jpeg',
            4: 'kr4.png',  // Changed to .png
            5: 'kr5.jpeg',
            6: 'kr6.jpg',
            7: 'kr7.gif'
        };

        const gridView = document.getElementById('vault-grid-view');
        const viewerView = document.getElementById('viewer-view');
        const decryptText = document.getElementById('decrypt-text');
        const imageFrame = document.getElementById('secure-image-frame');
        const artImage = document.getElementById('displayed-art');

        function openVault(nodeId, element) {
            gridView.style.display = 'none';
            viewerView.style.display = 'flex';

            imageFrame.style.display = 'none';
            decryptText.style.display = 'block';

            setTimeout(() => {
                decryptText.style.display = 'none';
                // FIXED: Pulls the exact name from the database above instead of guessing
                artImage.src = `krolo art/${fileDatabase[nodeId]}`;
                imageFrame.style.display = 'flex';
            }, 1200);

            element.classList.add('unlocked');
        }

        function closeVault() {
            viewerView.style.display = 'none';
            gridView.style.display = 'flex';
            artImage.src = '';
        }
    </script>
</body>

</html>
